<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - User</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                Cuti<span>Karyawan</span>
            </div>
            <div class="nav-links">
                <span>👤 <span id="userName"></span></span>
                <button class="btn btn-danger" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalCuti">0</h3>
                <p>Total Pengajuan Cuti</p>
            </div>
            <div class="stat-card" style="background: linear-gradient(135deg, #10b981, #059669);">
                <h3 id="totalHari">0</h3>
                <p>Total Hari Cuti</p>
            </div>
        </div>

        <div class="filters-bar">
            <div class="search-box">
                🔍 <input type="text" id="searchInput" placeholder="Cari data cuti...">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal Cuti</th><th>Durasi</th><th>Keperluan</th><th>Keterangan</th><th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" style="text-align:center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const currentUser = localStorage.getItem('currentUser');
        if (!currentUser) window.location.href = 'index.html';
        document.getElementById('userName').innerText = currentUser;

        let allData = [];

        async function loadData() {
            allData = await fetchCutiData();
            const userData = allData.filter(item => item.Nama === currentUser);
            
            const totalCuti = userData.length;
            const totalHari = userData.reduce((sum, item) => sum + (parseInt(item.Dipakai) || 0), 0);
            
            document.getElementById('totalCuti').innerText = totalCuti;
            document.getElementById('totalHari').innerText = totalHari;
            
            renderTable();
        }

        function renderTable() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allData.filter(item => 
                item.Nama === currentUser && 
                (keyword === '' || (item['Keperluan cuti'] && item['Keperluan cuti'].toLowerCase().includes(keyword)))
            );
            
            const tbody = document.getElementById('tableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">📭 Tidak ada data cuti</td></tr>';
                return;
            }
            
            let html = '';
            filtered.forEach(item => {
                html += `<tr>
                    <td>${escapeHtml(item['Cuti Dari'])} → ${escapeHtml(item['Cuti Sampai'])}</td>
                    <td><span class="badge badge-info">${item.Dipakai || 0} hari</span></td>
                    <td>${escapeHtml(item['Keperluan cuti'])}</td>
                    <td>${escapeHtml(item['Ket Cuti'])}</td>
                    <td><span class="badge badge-success">${item.Status || 'Aktif'}</span></td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        loadData();
    </script>
</body>
</html>

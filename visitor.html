<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lihat Data Cuti - Visitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                Cuti<span>Karyawan</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Beranda</a>
                <a href="visitor.html">Data Cuti</a>
                <a href="index.html" class="btn btn-outline">Login</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 style="color: white; margin-bottom: 24px;">📋 Data Cuti Karyawan</h1>
        
        <div class="filters-bar">
            <div class="search-box">
                🔍 <input type="text" id="searchInput" placeholder="Cari nama atau jabatan...">
            </div>
            <select id="filterJabatan">
                <option value="all">Semua Jabatan</option>
                <option value="Mekanik">Mekanik</option>
                <option value="Help. Mek">Help. Mek</option>
                <option value="T. Ban">T. Ban</option>
            </select>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nama</th><th>No Kary</th><th>Jabatan</th>
                        <th>Tanggal Cuti</th><th>Durasi</th><th>Keperluan</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align:center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let allData = [];

        async function loadData() {
            allData = await fetchCutiData();
            renderTable();
        }

        function renderTable() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const jabatan = document.getElementById('filterJabatan').value;
            
            let filtered = allData.filter(item => {
                const matchText = keyword === '' || 
                    (item.Nama && item.Nama.toLowerCase().includes(keyword)) ||
                    (item.Jabatan && item.Jabatan.toLowerCase().includes(keyword));
                const matchJabatan = jabatan === 'all' || item.Jabatan === jabatan;
                return matchText && matchJabatan;
            });
            
            const tbody = document.getElementById('tableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">📭 Tidak ada data</td></tr>';
                return;
            }
            
            let html = '';
            filtered.forEach(item => {
                html += `<tr>
                    <td><strong>${escapeHtml(item.Nama)}</strong></td>
                    <td>${escapeHtml(item['No Kary'])}</td>
                    <td>${escapeHtml(item.Jabatan)}</td>
                    <td>${escapeHtml(item['Cuti Dari'])} → ${escapeHtml(item['Cuti Sampai'])}</td>
                    <td><span class="badge badge-info">${item.Dipakai || 0} hari</span></td>
                    <td>${escapeHtml(item['Keperluan cuti'])}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        document.getElementById('searchInput').addEventListener('input', renderTable);
        document.getElementById('filterJabatan').addEventListener('change', renderTable);
        
        loadData();
    </script>
</body>
</html>
